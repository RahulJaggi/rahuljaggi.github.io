# Site Settings
title: "Rahul Jaggi"
tagline: "Software Developer · Open Source Enthusiast"
description: "Personal portfolio and blog of Rahul Jaggi — Software Developer passionate about building impactful products."
url: "https://rahuljaggi.github.io"
baseurl: ""

# Author
author:
  name: "Rahul Jaggi"
  email: "your@email.com"
  github: "rahuljaggi"
  linkedin: "rahuljaggi"
  twitter: "rahuljaggi"

# Build Settings
markdown: kramdown
highlighter: rouge
permalink: /blog/:year/:month/:day/:title/
paginate: 6
paginate_path: "/blog/page:num/"

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .bundle
  - .jekyll-cache
  - README.md

# Collections
collections:
  projects:
    output: true
    permalink: /projects/:name/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: false
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "project"

# SEO
twitter:
  username: rahuljaggi
  card: summary_large_image

social:
  name: Rahul Jaggi
  links:
    - https://github.com/rahuljaggi
    - https://linkedin.com/in/rahuljaggi

# Analytics (optional — add your GA4 ID here)
# google_analytics: G-XXXXXXXXXX

# Feed
feed:
  path: atom.xml
